name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck # tsc --noEmit
      - run: npm run lint # eslint .
      - run: npm run format:check # prettier --check
      - run: npm run test:ci # jest --ci
